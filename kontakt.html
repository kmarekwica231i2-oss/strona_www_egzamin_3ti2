<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Pogotowie komputerowe</title>

    <link rel="stylesheet" href="styl.css">
    <link rel="icon" href="favicon1.ico" type="image/x-icon">

    <script>
        function wyslij() {

            var imie = document.getElementById("imie").value;
            var nazwisko = document.getElementById("nazwisko").value;
            var email = document.getElementById("email").value.toLowerCase();
            var usluga = document.getElementById("usluga").value;

            document.getElementById("wynik").innerHTML =
                imie + " " + nazwisko + "<br>" +
                email + "<br>" +
                "Usługa: " + usluga;
        }
    </script>
</head>
<style>
    body {
    background-color: #99FFCC;
    margin: 0;
}

#kontener {
    width: 1000px;
    margin: auto;
}

#baner {
    background-color: #99FF66;
    height: 200px;
}

#baner img {
    width: 100%;
    height: 200px;
}

#menu {
    background-color: #66CCFF;
    text-align: center;
    padding: 20px 0;
}

#menu a {
    color: #006666;
    margin: 50px;
    font-size: 200%;
    text-decoration: none;
}

.kolumna {
    width: 310px;
    padding: 10px;
    float: left;
}

h2, h3 {
    text-align: center;
}

#stopka {
    clear: both;
    background-color: #66CCFF;
    color: #006666;
    text-align: right;
    height: 30px;
    padding: 20px;
}

#reset {
    background-color: #FF0000;
}

#przycisk {
    background-color: #00FF00;
}

</style>

<body>

<div id="kontener">

    <!-- BANER -->
    <section id="baner">
        <img src="baner2(MYSZ).gif" alt="Baner">
    </section>

    <!-- MENU -->
    <section id="menu">
        <a href="strona egzamin 3ti2 karol.html">O nas</a>
        <a href="kontakt.html">Kontakt</a>
    </section>

    <!-- BLOK GŁÓWNY -->
    <section id="glowny">

        <div class="kolumna"></div>

        <div class="kolumna">

            <h3>Formularz kontaktowy</h3>

            <table>
                <tr>
                    <td>Imię:</td>
                    <td><input type="text" id="imie"></td>
                </tr>

                <tr>
                    <td>Nazwisko:</td>
                    <td><input type="text" id="nazwisko"></td>
                </tr>

                <tr>
                    <td>E-mail:</td>
                    <td><input type="text" id="email"></td>
                </tr>

                <tr>
                    <td>Usługa:</td>
                    <td>
                        <select id="usluga">
                            <option>naprawa komputera</option>
                            <option>odzyskiwanie danych</option>
                            <option>problemy z oprogramowaniem</option>
                            <option>konfiguracja sieci LAN</option>
                            <option>inne</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="checkbox" checked>
                        Wyślij kopię wiadomości
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="reset" value="Resetuj" id="reset">
                        <input type="button" value="Prześlij" id="przycisk" onclick="wyslij()">
                    </td>
                </tr>
            </table>

            <p id="wynik"></p>

        </div>

        <div class="kolumna"></div>

    </section>

    <!-- STOPKA -->
    <section id="stopka">
        <p>Autor strony: <b>TUTAJ_WPISZ_SWÓJ_PESEL</b></p>
    </section>

</div>

</body>
</html>
